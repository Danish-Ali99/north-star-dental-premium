    d="M35,18
       C20,10 8,30 10,58
       C12,84 16,108 22,130
       C28,150 34,166 40,180
       C44,192 46,204 46,210
       C64,200 82,186 100,182
       C118,186 136,200 154,210
       C154,204 156,192 160,180
